<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선한목자교회 요금관리</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="logo.png?v=1">
    <link rel="icon" href="logo.png?v=1">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff;
        }
        iframe {
            width: 100%; height: 100%; border: none; background-color: #ffffff;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" src=""></iframe>

    <script>
        const rememberedId = localStorage.getItem('gs_utility_saved_id') || '';
        const streamlitUrl = "https://gschurch-fees.streamlit.app";
        const frame = document.getElementById('app-frame');
        
        // 💡 핵심2. 스트림릿 주소 뒤에 theme.base=light 를 붙여 파이썬 수정 없이도 무조건 밝은 모드로 나오게 강제합니다.
        let targetUrl = streamlitUrl + "/?embed=true&theme.base=light";
        
        if (rememberedId) {
            targetUrl += "&saved_id=" + encodeURIComponent(rememberedId);
        }
        frame.src = targetUrl;

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SAVE_ID') {
                localStorage.setItem('gs_utility_saved_id', event.data.id);
            }
            if (event.data && event.data.type === 'DELETE_ID') {
                localStorage.removeItem('gs_utility_saved_id');
            }
        });
    </script>
</body>
</html>
